<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ministerio del Poder Popular para el Hábitat y La Vivienda – MINHVI</title>
    <link rel="icon" type="image/x-icon" href="imagenes/descarga (1)-Photoroom.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="login-page">
        <header class="header-logos">
            <img class="header-img img__ministerio" src="imagenes/1.png">
            <img class="header-img img__misión" src="imagenes/Gran Misión.png" alt="">
        </header>
    <div class="main-container">
            <main class="login-content">
                <div class="main-conteiner">
                    <h2>INICIO DE SESIÓN</h2>
                        
                        <form class="login-form">

                            <div class="form-grupo grupo-1">
                                <label>Cedula:</label>
                                <img class="id-card-line" src="iconos/id-card-line.png"><input class="form-input" type="text" placeholder="Cedula de identidad" maxlength="9" required>
                            </div>

                            <div class="form-grupo grupo-2">
                                <label>Contraseña:</label>
                                <img class="lock-fill" src="iconos/lock-fill.png" alt=""><input class="form-input" type="password" placeholder="Contraseña" maxlength="20" required>
                            </div>
                            <a class="olivido-password" href="#">¿Olvidó su contraseña?</a>
                        </form>
                </div>    
            </main>
    </div>        
</div>
</body>
</html>
