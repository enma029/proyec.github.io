<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ministerio del Poder Popular para el Hábitat y La Vivienda – MINHVI</title>
    <link rel="stylesheet" href="styles2.css">
    <link rel="stylesheet" href="/fuente/fonts.css">
</head>
    <body>
        <!-- <input type="checkbox" id="open-menu" class="header__checkbox"> -->
    <!-- barra superior -->
        <header class="top-bar">
                <!-- <label for="open-menu" role="button" class="open-nav-button">=</label> -->
                
            <div class="titulo">
                <span>Direccion</span>
            </div>
            <div class="salida">
                <span>Salir</span>
            </div>
        </header>
    
    <div class="conteiner">
        <img class="conteiner-img" src="/imagenes/descarga (1)-Photoroom.png" alt="">
        <nav>
            <ul>
                
                <div class="conteiner-iconos">
                <a href="Direccion.html">    
                    <li style="padding-top: 20px;">Dirección</li>
                    <img class="iconos" src="/iconos/home.png" alt="">
                </a>
                </div>

                <div class="conteiner-iconos">
                    <a href="atencion_al_ciudadano.html">
                    <li style="padding-top: 10px;">Atención al Ciudadano</li>
                    <img class="iconos" style="height: 30px; transform: translateY(-170%); padding-left: 18px;" src="/iconos/team.png" alt="">
                    </a>
                </div>
                
                <div class="conteiner-iconos">
                    <li style="padding-top: 10px;">Redes Populares en Vivienda</li>
                    <img class="iconos" style="height: 30px; padding-left: 18px;" src="/iconos/conecction.png">
                </div>
                
                <div class="conteiner-iconos">
                    <li >Atención de desarrollo Integral de Urbanismos</li>
                    <img src="/iconos/self-development.png" style=" padding-left: 18px; transform: translateY(-200%); " alt="">
                </div>

                <div class="conteiner-iconos">
                    <li style=" padding-top:20px;" >SUNAVI</li>
                    <img class="iconos" src="/iconos/residential.png" alt="">
                </div>
                
                <div class="conteiner-iconos">
                    <li style="padding-top: 20px;">BANAVIH</li>
                    <img class="iconos" src="/iconos/money.png" alt="">
                </div>

                <div class="conteiner-iconos">
                    <li style="padding-top: 20px;">INTU</li>
                    <img class="iconos" src="/iconos/location-pin.png" alt="">
                </div>

                <div class="conteiner-iconos">
                    <li style="padding-top: 20px;">Gestión Humana</li>
                    <img class="iconos" src="/iconos/project.png">
                </div>
            </ul>
        </nav>
    </div>
    
    <main>
        <div class="login">
            <div class="h3">
                <h3>Formulario de Registro De Atención al Ciudadano</h3>
            </div>

            <form action="">
            <div class="flex">    
                
                <div class="conteiner-input conteiner-form login-nombre">
                    <label class="nombre">Nombre y Apellido </label>
                    <input id="nombre" type="text" placeholder="Nombre">
                </div>

                <div class="conteiner-input input2">
                    <label class="Cedula">Cedula de Identida</label>    
                    <input id="Cedula" type="number" placeholder="V-000.000.00">
                </div>
            </div>

            <div class="flex" >   
                
                <div class="conteiner-input input3">
                    <label class="Telefono">Numero de Telefono</label>    
                    <input id="Telefono" type="number" placeholder="Telefono">
                </div>

                <div class="div-Genero conteiner-form">
                    <label class="Genero">Genero</label>
                        <select id="Genero">
                            <option value="">Seleccione Genero</option>
                            <option value="">Masculino</option>
                            <option value="">Femenino</option>
                        </select>
                </div>
            </div>

            <div class="flex">
            <div class="conteiner-form">
                <label class="Discapacidad">Discapacidad</label>
                    <select id="Discapacidad">
                        <option value="">Seleccione Discapacidad</option>
                        <option value="">1</option>
                        <option value="">2</option>
                        <option value="">3</option>
                        <option value="">4</option>
                    </select>
                </div>
                <div class="conteiner-form municipio">
                    <label class="Municipio">Municipio</label>
                        <select name="" id="Municipio">
                            <option value="">Seleccione Municipio</option>
                            <option value="">Nirgua</option>
                            <option value="">San Felipe</option>
                            <option value="">Veroes</option>
                            <option value="">Manul Monje</option>
                            <option value="">Chivacoa</option>
                        </select>    
                </div>
            </div>
            <div class="indicador">
                <label class="Asunto">Asunto / indicador de Gestión</label>
                    <select name="" id="Asunto">
                        <option value="">Seleccione Motivo...</option>
                    </select>
            </div>
            <div class="Departamento">
                <label class="depeartamentos-label">Selccion / Departamento</label>
                    <select name="" id="Departamento">
                        <option value="">Seleccione Departamento</option>
                        <option value="">Atención al Ciudadano</option>
                        <option value="">Redes Populares en Vivienda</option>
                        <option value="">Atención de desarrollo Integral de Urbanismos</option>
                        <option value="">SUNAVI</option>
                        <option value="">BANAVIH</option>
                        <option value="">INTU</option>
                        <option value="">Gestión Humana</option>
                    </select>
            </div>
        
        <div class="textarea">    
            <textarea rows="5" cols="60" placeholder="Observacion..."></textarea>
        </div>
        <div class="flex enviar">
            <div class="div-Seguimiento">
            <label class="seguimiento">Seguimiento</label>
                <select id="Seguimiento">
                    <option value="">0</option>
                    <option value="">1</option>
                    <option value="">2</option>
                    <option value="">3</option>
                </select>
            </div>
            <input  id="enviar"type="submit">        
        </div>    
        </form>        
        </div>
    </main>
</body>
</html>
